<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator punktów do szkoły średniej</title>
    <link rel="stylesheet" href="src/style.css">
  </head>
  <body>
    <div id="app">
      <header><h1>Kalkulator punktów do szkoły średniej</h1></header>
      <main>
        <form>
          <section id="egzaminy">
            <h2>Wyniki z egzaminów ósmoklasisty</h2>
            <div class="osiagniecie_item" id="nie-znam-wynikow-input">
              <input type="checkbox" name="nie-znam-wynikow" id="nie-znam-wynikow">
              <label for="nie-znam-wynikow">Nie znam jeszcze swoich wyników</label>
            </div>
            <div class="grid_container">
              <div class="egzamin_item">
                <label for="wynik-e8-polski">Wynik z E8 z języka polskiego</label><br>
                <input type="number" name="wynik-e8-polski" id="wynik-e8-polski" placeholder=" np. 80%">
              </div>
              <div class="egzamin_item">
                <label for="wynik-e8-matma">Wynik z E8 z matematyki</label><br>
                <input type="number" name="wynik-e8-matma" id="wynik-e8-matma" placeholder=" np. 80%">
              </div>
              <div class="egzamin_item">
                <label for="wynik-e8-angol">Wynik z E8 z języka obcego nowożytnego</label><br>
                <input type="number" name="wynik-e8-angol" id="wynik-e8-angol" placeholder=" np. 80%">
              </div>
            </div>
          </section><hr>
          <section id="oceny">
            <h2>Oceny z przedmiotów punktowanych</h2>
            <div class="grid_container">
              <div class="ocena_item">
                <label for="ocena-polski">Ocena z języka polskiego</label><br>
                <select name="ocena-polski" id="ocena-polski">
                  <option value="0">Wybierz...</option>
                  <option value="18">Celujący (6)</option>
                  <option value="17">Bardzo dobry (5)</option>
                  <option value="14">Dobry (4)</option>
                  <option value="8">Dostateczny (3)</option>
                  <option value="2">Dopuszczający (2)</option>
                </select>
              </div>
              <div class="ocena_item">
                <label for="ocena-matma">Ocena z matematyki</label><br>
                <select name="ocena-matma" id="ocena-matma">
                  <option value="0">Wybierz...</option>
                  <option value="18">Celujący (6)</option>
                  <option value="17">Bardzo dobry (5)</option>
                  <option value="14">Dobry (4)</option>
                  <option value="8">Dostateczny (3)</option>
                  <option value="2">Dopuszczający (2)</option>
                </select>
              </div>
              <div class="ocena_item">
                <label for="ocena-p1">Ocena z pierwszego przedmiotu punktowanego</label><br>
                <select name="ocena-p1" id="ocena-p1">
                  <option value="0">Wybierz...</option>
                  <option value="18">Celujący (6)</option>
                  <option value="17">Bardzo dobry (5)</option>
                  <option value="14">Dobry (4)</option>
                  <option value="8">Dostateczny (3)</option>
                  <option value="2">Dopuszczający (2)</option>
                </select>
              </div>
              <div class="ocena_item">
                <label for="ocena-p2">Ocena z drugiego przedmiotu punktowanego</label><br>
                <select name="ocena-p2" id="ocena-p2">
                  <option value="0">Wybierz...</option>
                  <option value="18">Celujący (6)</option>
                  <option value="17">Bardzo dobry (5)</option>
                  <option value="14">Dobry (4)</option>
                  <option value="8">Dostateczny (3)</option>
                  <option value="2">Dopuszczający (2)</option>
                </select>
              </div>
            </div>
          </section><hr>
          <section id="osiagniecia">
            <h2>Osiągnięcia dodatkowe</h2>
            <div class="grid_container">
              <div class="osiagniecie_item">
                <input type="checkbox" name="wolontariat" id="wolontariat">
                <label for="wolontariat">Udział w wolontariacie (+3 pkt.)</label>
              </div>
              <div class="osiagniecie_item">
                <input type="checkbox" name="pasek" id="pasek">
                <label for="pasek">Świadectwo z czerwonym paskiem (+7 pkt.)</label>
              </div>
              <div class="osiagniecie_item">
                <input type="checkbox" name="finalista" id="finalista">
                <label for="finalista">Finalista wojewódzkiego konkursu przedmiotowego (+10 pkt.)</label>
              </div>
              <div class="osiagniecie_item">
                <input type="checkbox" name="laureat" id="laureat">
                <label for="laureat">Laureat wojewódzkiego konkursu przedmiotowego</label>
              </div>
              <div class="osiagniecie_item" id="dodatkowe">
                <label for="dod" id="dod-label">Inne dodatkowe punkty</label><br>
                <input type="number" name="dod" id="dod">
              </div>
            </div>
          </section><hr>
          <div class="zatwierdz_container">
            <button type="submit" id="zatwierdz_bttn">Licz!</button>
          </div>
        </form>
      </main>
      <footer><h2 id="wynik_print"></h2></footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
